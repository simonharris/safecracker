services:

  api:
    build: ./api
    image: sc-api:latest
    labels:
      - "traefik.http.routers.api.rule=Host(`safe-api.pointbeing.net`)"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=5010"
    networks:
      - traefik_default
    ports:
      - "5010:5010"
    restart: unless-stopped

  web:
    build: ./site
    image: cs-site:latest
    labels:
      - "traefik.http.routers.web.rule=Host(`safe.pointbeing.net`)"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=5011"
    networks:
      - traefik_default
    ports:
      - "5011:5011"
    depends_on:
      - api
    restart: unless-stopped


networks:
  traefik_default:
    name: traefik_default
    external: true



